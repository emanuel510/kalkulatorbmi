<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oblicz Bmi</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Display:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calosc">
        <p id="glownyTekst">Oblicz BMI</p>
        <p class="tekst">Waga ciała (kg):</p>
        <input type="text" id="inputWagi" placeholder="70">
        <p class="tekst">Wzrost ciała (cm):</p>
        <input type="text" id="inputWzrostu" placeholder="180">
        <p id="wynikBmi">BMI: 0.000</p>
        <p id="klasyfikacjaBmi" class="tekst">Brak klasyfikacji</p>
        <p id="informacjaBmi" class="tekst">Brak informacji</p>
        <button type="button" id="guzikObliczeniowy">Oblicz</button>
        <button type="button" id="guzikResetujacy">Zresetuj</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
